<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Shop</title>
    <link rel="stylesheet" href="css/cart.css">
    <link rel="stylesheet" href="css/change.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">Thanh Shop</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li id="profileNav"><a href="profile.html">Profile</a></li>
                <li id="loginNav"><a href="login.html" title="Login"><i class="fa-regular fa-user"></i></a></li>
                <li><a href="cart.html" title="Cart"><i class="fa-solid fa-bag-shopping"></i></a></li>
                <li>
                    <button onclick="changemode()" id="btn" class="theme-btn" title="Change theme">
                        <i class="fa-regular fa-lightbulb"></i>
                    </button>
                </li>
            </ul>
        </nav>
    </header>

    <section class="cart-section">
        <div class="cart-container">
            <h1>Your Cart</h1>
            <div id="cartItems" class="cart-items"></div>
            <div id="cartTotal" class="cart-total">Total: $0.00</div>

            <div class="cart-buttons">
                <a href="products.html" class="cart-btn secondary-btn">Continue Shopping</a>
                <a href="checkout.html" class="cart-btn primary-btn">Proceed to Checkout</a>
            </div>
        </div>
    </section>

    <button></button>

    <footer>
        <p>&copy; 2026 Thanh Shop. All rights reserved.</p>
    </footer>

    <script src="js/cart.js"></script>
    <script src="js/change.js"></script>
    <script src="js/loginNav.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Deatils</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/product-details.css">
</head>
<body>
    <header class = "custom-header">
        <div class="container d-flex justify-content-between align-items-center py-3">
            <div class="logo">Thanh Shop</div>
            <nav>
                <ul class="nav-list">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html" class="active-link">Products</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="product-details-section">
        <div class="container">
            <div class="row g-5 align-items-center" id="productDetailsContainer">
                <div class="col-md-6">
                    <div class="product-image-box">
                        <img id="productImage" src="" alt="" class="img-fluid product-image">
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="product-info">
                        <h1 id="productName" class="product-title"></h1>
                        <p id="productPrice" class="product-price"></p>
                        <p id="productDescription" class="product-description"></p>

                        <div class="quantity-box mt-4">
                            <label for="quantity" class="form-label">Quantity:</label>
                            <input type="number" id="quantity" class="form-control quantity-input" min="1" value="1">
                        </div>

                        <div class="total-box mt-4">
                            <h4>Total: <span id="totalPrice">$0.00</span></h4>
                        </div>

                        <button id="addToCartBtn" class="btn btn-dark add-cart-btn mt-4">
                            Add to Cart
                        </button>

                        <p id="cartMessage" class="cart-message mt-3"></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src ="js/product-details.js"></script>
</body>
</html>

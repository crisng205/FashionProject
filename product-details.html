<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Shop</title>
    <link rel="stylesheet" href="css/product-details.css">
    <link rel="stylesheet" href="css/change.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">Thanh Shop</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="login.html" title="Login"><i class="fa-regular fa-user"></i></a></li>
                <li><a href="cart.html" title="Cart"><i class="fa-solid fa-bag-shopping"></i></a></li>
                <li>
                    <button onclick="changemode()" id="btn" class="theme-btn" title="Change theme">
                        <i class="fa-regular fa-lightbulb"></i>
                    </button>
                </li>
            </ul>
        </nav>
    </header>

    <section class="product-details-section">
        <div class="product-details-container" id="productDetailsContainer">
            <div class="product-image-box">
                <img id="productImage" src="" alt="" class="product-image">
            </div>

            <div class="product-info">
                <h1 id="productName" class="product-title"></h1>
                <p id="productPrice" class="product-price"></p>
                <p id="productDescription" class="product-description"></p>

                <div class="quantity-box">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" class="quantity-input" min="1" value="1">
                </div>

                <div class="total-box">
                    <h3>Total: <span id="totalPrice">$0.00</span></h3>
                </div>

                <button id="addToCartBtn" class="add-cart-btn">Add to Cart</button>

                <p id="cartMessage" class="cart-message"></p>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Thanh Shop. All rights reserved.</p>
    </footer>

    <script src="js/product-details.js"></script>
    <script src="js/change.js"></script>
</body>
</html>

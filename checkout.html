<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Shop</title>
    <link rel="stylesheet" href="css/checkout.css">
    <link rel="stylesheet" href="css/change.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">Thanh Shop</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="login.html" title="Login"><i class="fa-regular fa-user"></i></a></li>
                <li><a href="cart.html" title="Cart"><i class="fa-solid fa-bag-shopping"></i></a></li>
                <li>
                    <button onclick="changemode()" id="btn" class="theme-btn" title="Change theme">
                        <i class="fa-regular fa-lightbulb"></i>
                    </button>
                </li>
            </ul>
        </nav>
    </header>

    <section class = "checkout-section">
        <div class = "checkout-container">
            <div class="checkout-form">
                <h1>Check Out</h1>

                <form id="checkoutForm">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" name="fullName" placeholder="Enter Your Name">
                    </div>
                    <div class="form-group">
                        <label for="address">Address</label>
                        <input type="text" id="address" name="address" placeholder="Enter Your Address">
                    </div>
                    <div class="form-group">
                        <label for="paymentMethod">Payment Method</label>
                        <select name="paymentMethod" id="paymentMethod">
                            <option value="">Select Your Payment Method</option>
                            <option value="cash">Cash</option>
                            <option value="creditdebit">Credit/Debit</option>
                        </select>
                    </div>

                    <button type="submit" class="checkout-btn">Checkout</button>
                </form>
            </div>

            <div class="summary-box">
                <h2>Summary</h2>
                <div id="orderSummary"></div>
                <div id="orderTotal" class="order-total">Total: $0.00</div>
            </div>
        </div>        
    </section>

    <footer>
        <p>&copy; 2026 Thanh Shop. All rights reserved.</p>
    </footer>

    <script src="js/checkout.js"></script>
    <script src="js/change.js"></script>
</body>

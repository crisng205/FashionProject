<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Shop</title>
    <link rel="stylesheet" href="css/register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">Thanh Shop</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="login.html" title="Login"><i class="fa-regular fa-user"></i></a></li>
                <li><a href="cart.html" title="Cart"><i class="fa-solid fa-bag-shopping"></i></a></li>
                <li>
                    <button onclick="changemode()" id="btn" class="theme-btn" title="Change theme">
                        <i class="fa-regular fa-lightbulb"></i>
                    </button>
                </li>
            </ul>
        </nav>
    </header>
    <section class="auth-section">
        <div class="auth-box">
            <h1>Register</h1>

            <form id="registerForm">
                <div class="form-group">
                    <label for="registerName">Full Name</label>
                    <input type="text" id="registerName" placeholder="Enter your full name">
                    <small class="error-text" id="registerNameError"></small>
                </div>

                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" placeholder="Enter your email">
                    <small class="error-text" id="registerEmailError"></small>
                </div>

                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" placeholder="Enter your password">
                    <small class="error-text" id="registerPasswordError"></small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password">
                    <small class="error-text" id="confirmPasswordError"></small>
                </div>

                <button type="submit" class="auth-btn">Register</button>
                <p id="registerMessage" class="auth-message"></p>
            </form>

            <p class="auth-link">
                Already have an account?
                <a href="login.html">Login here</a>
            </p>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Thanh Shop. All rights reserved.</p>
    </footer>

    <script src="js/register.js"></script>
    <script src="js/change.js"></script>
</body>
</html>

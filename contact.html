<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Shop</title>
    <link rel="stylesheet" href="css/contact.css">
    <link rel="stylesheet" href="css/change.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">Thanh Shop</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="login.html" title="Login"><i class="fa-regular fa-user"></i></a></li>
                <li><a href="cart.html" title="Cart"><i class="fa-solid fa-bag-shopping"></i></a></li>
                <li>
                    <button onclick="changemode()" id="btn" class="theme-btn" title="Change theme">
                        <i class="fa-regular fa-lightbulb"></i>
                    </button>
                </li>
            </ul>
        </nav>
    </header>

    <div class="contact-box">
        <h1>Contact Us</h1>

        <form id="contactForm">
            <div class="form-group">
                <label for="contactName">Name</label>
                <input type="text" id="contactName" placeholder="Enter your name">
                <small class="error-text" id="contactNameError"></small>
            </div>

            <div class="form-group">
                <label for="contactEmail">Email</label>
                <input type="email" id="contactEmail" placeholder="Enter your email">
                <small class="error-text" id="contactEmailError"></small>
            </div>

            <div class="form-group">
                <label for="contactMessage">Message</label>
                <textarea id="contactMessage" rows="5" placeholder="Write your message"></textarea>
                <small class="error-text" id="contactMessageError"></small>
            </div>

            <button type="submit" class="contact-btn">Send Message</button>
            <p id="contactSuccess" class="success-message"></p>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 Thanh Shop. All rights reserved.</p>
    </footer>

    <script src="js/contact.js"></script>
    <script src="js/change.js"></script>
</body>
</html>

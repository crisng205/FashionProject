<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Shop</title>
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/change.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">Thanh Shop</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="login.html" title="Login"><i class="fa-regular fa-user"></i></a></li>
                <li><a href="cart.html" title="Cart"><i class="fa-solid fa-bag-shopping"></i></a></li>
                <li>
                    <button onclick="changemode()" id="btn" class="theme-btn" title="Change theme">
                        <i class="fa-regular fa-lightbulb"></i>
                    </button>
                </li>
            </ul>
        </nav>
    </header>
    <div class="profile-box">
        <h1>My Profile</h1>

        <div class="form-group">
            <label for="profileName">Full Name</label>
            <input type="text" id="profileName" placeholder="Your name">
            <small class="error-text" id="nameError"></small>
        </div>

        <div class="form-group">
            <label for="profileEmail">Email</label>
            <input type="email" id="profileEmail" placeholder="Your email">
            <small class="error-text" id="emailError"></small>
        </div>

        <div class="profile-buttons">
            <button id="saveProfileBtn" class="profile-btn">Update Profile</button>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>

        <p id="profileMessage" class="profile-message"></p>
    </div>

    <footer>
        <p>&copy; 2026 Thanh Shop. All rights reserved.</p>
    </footer>

    <script src="js/profile.js"></script>
    <script src="js/change.js"></script>
</body>
</html>
